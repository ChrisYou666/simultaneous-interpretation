name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-test:
    name: Backend Test (Java 21)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: si_backend
          MYSQL_USER: si_user
          MYSQL_PASSWORD: si_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 --silent && echo "MySQL ready" && break
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done

      - name: Run backend tests
        run: |
          cd backend-java
          mvn test -Dspring.datasource.url=jdbc:mysql://127.0.0.1:3306/si_backend \
                   -Dspring.datasource.username=root \
                   -Dspring.datasource.password=root \
                   -Dspring.profiles.active=test

      - name: Upload JaCoCo coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend-java/target/site/jacoco/jacoco.xml
          flags: unittests
          name: backend-coverage

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend-java/target/surefire-reports/*.xml

  frontend-test:
    name: Frontend Test (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Generate coverage report
        run: npm run test:coverage

      - name: Upload frontend coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          flags: frontend
          name: frontend-coverage

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: test-results/
