# 本地覆盖（勿提交真实密钥）。复制为 application-local.yml：
#   copy application-local.example.yml application-local.yml
#
# run-dev.cmd 已使用 profile=local，会与 application.yml 合并。

spring:
  datasource:
    # 本机 MySQL root 密码（须与 mysql -u root -p 一致）
    password: "在此填写"

# ── 百炼统一配置（ASR / 翻译 / TTS 共用一个 Key）────────────
# 只需配一次，各服务独立指定模型，互不干扰。
# 不配 yaml 时也可只用环境变量 DASHSCOPE_API_KEY。
#
# app:
#   dashscope:
#     api-key: 你的百炼API_KEY          # ASR/翻译/TTS 统一认证
#     asr-model: fun-asr-realtime       # Fun-ASR 模型（默认）
#     translate-model: qwen-turbo       # 翻译模型（默认；可换 qwen-vl-plus 等）
#     tts-model: cosyvoice-v3-flash     # TTS 模型（默认；可换 cosyvoice-v3）
#     tts-voice: longanyang             # TTS 音色（默认）
